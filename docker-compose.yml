services:
  pr-review-agent:
    build:
      context: .
    environment:
      GITHUB_APP_ID: ${GITHUB_APP_ID:-}
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:-change-me}
      GITHUB_API_BASE_URL: ${GITHUB_API_BASE_URL:-https://api.github.com}
      GITHUB_APP_PRIVATE_KEY_FILE: ${GITHUB_APP_PRIVATE_KEY_FILE:-/run/secrets/github-app-private-key.pem}
      LLM_API_BASE_URL: ${LLM_API_BASE_URL:-https://api.telnyx.com/v2/ai}
      LLM_MODEL: ${LLM_MODEL:-moonshotai/Kimi-K2.6}
      LLM_API_KEY: ${LLM_API_KEY:-}
      AGENT_MAX_TURNS: ${AGENT_MAX_TURNS:-12}
      REVIEW_NOTES_DIR: ${REVIEW_NOTES_DIR:-/app/review_runs}
    ports:
      - "${APP_PORT:-8020}:8020"
    volumes:
      - ./review_runs:/app/review_runs
      - ${GITHUB_APP_PRIVATE_KEY_HOST_PATH:-./secrets/github-app-private-key.pem}:${GITHUB_APP_PRIVATE_KEY_FILE:-/run/secrets/github-app-private-key.pem}:ro
